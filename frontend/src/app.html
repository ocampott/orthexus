<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO & título -->
    <title>Orthexus — Sistema de Gestión</title>
    <meta name="description" content="Orthexus: Sistema integral de gestión para ortopedias. Inventario, ventas, alquileres y proveedores." />
    <meta name="application-name" content="Orthexus" />

    <!-- Favicons -->
    <link rel="icon"             type="image/png" sizes="32x32"   href="%sveltekit.assets%/favicon-32.png" />
    <link rel="icon"             type="image/png"                  href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180"                   href="%sveltekit.assets%/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Orthexus — Sistema de Gestión" />
    <meta property="og:description" content="Sistema integral de gestión para ortopedias." />
    <meta property="og:image"       content="%sveltekit.assets%/icon-192.png" />
    <meta property="og:type"        content="website" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
